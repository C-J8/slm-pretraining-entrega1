project:
  name: "slm-pretraining"
  seed: 1337

model:
  name: "llama_inspired_100m"
  vocab_size: 50257
  block_size: 1024
  n_layer: 10
  n_embd: 768
  n_head: 12
  head_dim: 64
  n_kv_head: 12
  ffn_hidden_size: 2048
  dropout: 0.0
  bias: false
  norm: "rmsnorm"
  activation: "swiglu"
  positional_encoding: "rope"
  tie_weights: true

data:
  dataset_name: "HuggingFaceFW/fineweb-edu"
  dataset_config: "sample-10BT"
  split: "train"
  text_field: "text"
  train_bin: "data/fineweb_edu_train.bin"
  val_bin: "data/fineweb_edu_val.bin"
  val_fraction: 0.01
  streaming: true
  num_proc: 1

training:
  batch_size: 8
  gradient_accumulation_steps: 16
  effective_batch_size: 128
  learning_rate: 3.0e-4
  min_learning_rate: 3.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  warmup_steps: 1000
  max_steps: 20000
  eval_interval: 500
  eval_iters: 50
  log_interval: 10
  save_interval: 2000
  grad_clip: 1.0
  dtype: "bfloat16"
  optimizer: "adamw"
  scheduler: "cosine"

paths:
  checkpoint_dir: "checkpoints"
  output_dir: "outputs"
  train_log: "outputs/train_log.csv"
  samples_file: "outputs/samples.txt"

generation:
  max_new_tokens: 100
  temperature: 0.8
  top_k: 50

